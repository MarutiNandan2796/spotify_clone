version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: spotify-clone-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - spotify-network

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: spotify-clone-api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/spotify_clone
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=spotify_clone_secret_key_123
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - backend-uploads:/backend/uploads
    networks:
      - spotify-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: spotify-clone-client
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - spotify-network

volumes:
  mongo-data:
  backend-uploads:

networks:
  spotify-network:
    driver: bridge
